name: Full-Stack Multi-Environment CI/CD Pipeline

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # 🗄️ JOB 1: Deploy Database Migrations to Web Supabase
  deploy-backend:
    runs-on: ubuntu-latest
    environment: production # Mounts your protected GitHub environment vault
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Deploy Database Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  # 💻 JOB 2: Inject Live Environment Keys & Build Flutter Frontend
  deploy-frontend:
    needs: deploy-backend # Wait for backend tracking to safely complete first
    runs-on: ubuntu-latest
    environment: production # Mounts frontend configuration secrets as well
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Compile Production Web Assets with Dynamic Environment Defines
        run: |
          flutter pub get
          flutter build web --release \
            --dart-define=SUPABASE_URL="${{ secrets.WEB_SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.WEB_SUPABASE_ANON_KEY }}" \
            --base-href "/${{ github.event.repository.name }}/"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages