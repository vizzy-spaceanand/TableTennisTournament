name: Multi-Environment Full-Stack Pipeline

on:
  push:
    branches: [main, develop]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # 🗄️ JOB 1: Dynamic Database Migration Synchronization
  deploy-backend:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Link to Remote Supabase Project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} -p ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Database Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  # 💻 JOB 2: Dynamic Frontend Build with Subdirectory Routing
  deploy: # 👈 Change this keyword right here from 'deploy-frontend'
    needs: deploy-backend
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      # 🧠 Step A: Build Production (Root path) vs Staging (Subfolder path)
      # Notice the different --base-href injection based on the branch name!
      # We append a trailing slash to the staging path so Flutter resolves routing correctly.
      - name: Compile Web Assets
        run: |
          flutter pub get
          if [ "${{ github.ref_name }}" = "main" ]; then
            flutter build web --release \
              --dart-define=SUPABASE_URL="${{ secrets.WEB_SUPABASE_URL }}" \
              --dart-define=SUPABASE_ANON_KEY="${{ secrets.WEB_SUPABASE_ANON_KEY }}" \
              --base-href "/${{ github.event.repository.name }}/"
          else
            flutter build web --release \
              --dart-define=SUPABASE_URL="${{ secrets.WEB_SUPABASE_URL }}" \
              --dart-define=SUPABASE_ANON_KEY="${{ secrets.WEB_SUPABASE_ANON_KEY }}" \
              --base-href "/${{ github.event.repository.name }}/staging/"
          fi

      # 🚀 Step B: Deploy to the correct destination folder on the gh-pages branch
      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          # target-folder leaves root files untouched when pushing staging updates
          target-folder: ${{ github.ref_name == 'main' && '' || 'staging' }}
          clean: ${{ github.ref_name == 'main' && 'true' || 'false' }}
