name: Multi-Environment Full-Stack Pipeline

on:
  push:
    branches: [ main, develop ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # 🗄️ JOB 1: Dynamic Database Migration Synchronization
  deploy-backend:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Link to Remote Supabase Project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} -p ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Database Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  # 💻 JOB 2: Dynamic Frontend Build with Target Injection
  deploy:
    needs: deploy-backend
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Compile Web Assets
        run: |
          flutter pub get
          if [ "${{ github.ref_name }}" = "main" ]; then
            flutter build web --release \
              --dart-define=SUPABASE_URL="${{ secrets.WEB_SUPABASE_URL }}" \
              --dart-define=SUPABASE_ANON_KEY="${{ secrets.WEB_SUPABASE_ANON_KEY }}" \
              --base-href "/${{ github.event.repository.name }}/prod/"
          else
            flutter build web --release \
              --dart-define=SUPABASE_URL="${{ secrets.WEB_SUPABASE_URL }}" \
              --dart-define=SUPABASE_ANON_KEY="${{ secrets.WEB_SUPABASE_ANON_KEY }}" \
              --base-href "/${{ github.event.repository.name }}/staging/"
          fi

      # ✅ FIX: Both environments deploy into their own named subfolder.
      # Neither deploy sets clean:true, so they can never overwrite each other.
      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
          target-folder: ${{ github.ref_name == 'main' && 'prod' || 'staging' }}
          clean: true
          # clean:true only cleans the target-folder itself (prod/ or staging/),
          # NOT the entire gh-pages root — so each env is fully isolated.