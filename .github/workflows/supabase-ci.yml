name: Full-Stack CI/CD Pipeline

on:
  push:
    branches: [ main ] # Fires automatically whenever you commit or merge into main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # JOB 1: Backend Database Synchronization
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Deploy Database Migrations to Supabase
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  # JOB 2: Flutter Web Build and Hosting Deployment
  deploy-frontend:
    needs: deploy-backend # Ensures backend migrations run successfully first!
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Flutter Web App
        run: |
          flutter pub get
          flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Deploy Static Web Assets to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages